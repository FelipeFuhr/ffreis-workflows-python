name: Python Hypothesis Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      test-dir:
        description: "Directory containing hypothesis tests"
        type: string
        default: "tests/hypothesis_tests"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 60
      hypothesis-profile:
        description: "Hypothesis profile to use"
        type: string
        default: "ci"

permissions:
  contents: read

jobs:
  hypothesis:
    name: Hypothesis Property Tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps (frozen)
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
        run: |
          set -euo pipefail
          uv sync --frozen --extra "$UV_EXTRAS"

      - name: Run Hypothesis tests
        env:
          HYPOTHESIS_PROFILE: ${{ inputs.hypothesis-profile }}
          TEST_DIR: ${{ inputs.test-dir }}
        run: |
          set -euo pipefail
          uv run --frozen pytest $TEST_DIR
