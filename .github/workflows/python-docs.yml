name: Python Docs Build

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install for docs"
        type: string
        default: "docs"
      docs-command:
        description: "Command to build the documentation"
        type: string
        default: "uv run mkdocs build --strict"

permissions:
  contents: read

jobs:
  docs:
    name: Build Docs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps (docs extras)
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
        run: |
          set -euo pipefail
          uv sync --frozen --extra "$UV_EXTRAS"

      - name: Build docs
        env:
          DOCS_COMMAND: ${{ inputs.docs-command }}
        run: |
          set -euo pipefail
          $DOCS_COMMAND
