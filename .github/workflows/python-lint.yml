name: Python Lint

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      source-dirs:
        description: "Space-separated dirs to check with ruff"
        type: string
        default: "src tests"
      mypy-dirs:
        description: "Space-separated dirs to check with mypy"
        type: string
        default: "src"
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"

permissions:
  contents: read

jobs:
  lint:
    name: Ruff + Mypy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
        run: |
          set -euo pipefail
          uv sync --frozen --extra "$UV_EXTRAS"

      - name: Ruff check
        env:
          SOURCE_DIRS: ${{ inputs.source-dirs }}
        run: |
          set -euo pipefail
          uv run ruff check $SOURCE_DIRS

      - name: Mypy
        env:
          MYPY_DIRS: ${{ inputs.mypy-dirs }}
        run: |
          set -euo pipefail
          uv run mypy $MYPY_DIRS
