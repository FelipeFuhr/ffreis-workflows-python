name: Python Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name (and optional tag) for the container image"
        type: string
        required: true
      containerfile:
        description: "Path to the Containerfile or Dockerfile"
        type: string
        default: "Containerfile"
      context:
        description: "Build context directory"
        type: string
        default: "."
      build-args:
        description: "Newline-separated build-arg pairs (KEY=VALUE)"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  container-build:
    name: Container Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Detect container engine
        id: engine
        run: |
          set -euo pipefail
          if command -v podman &>/dev/null; then
            echo "bin=podman" >> "$GITHUB_OUTPUT"
          elif command -v docker &>/dev/null; then
            echo "bin=docker" >> "$GITHUB_OUTPUT"
          else
            echo "Neither podman nor docker found in PATH" >&2
            exit 1
          fi

      - name: Build image
        run: |
          set -euo pipefail
          BUILD_ARGS=""
          if [ -n "${{ inputs.build-args }}" ]; then
            while IFS= read -r arg; do
              [ -z "$arg" ] && continue
              BUILD_ARGS="$BUILD_ARGS --build-arg $arg"
            done <<< "${{ inputs.build-args }}"
          fi
          ${{ steps.engine.outputs.bin }} build \
            -f "${{ inputs.containerfile }}" \
            -t "${{ inputs.image-name }}" \
            $BUILD_ARGS \
            "${{ inputs.context }}"

      - name: Smoke test image
        run: |
          set -euo pipefail
          ${{ steps.engine.outputs.bin }} run --rm "${{ inputs.image-name }}" --help \
            || ${{ steps.engine.outputs.bin }} run --rm "${{ inputs.image-name }}" true
