name: Python Security (pip-audit)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      fail-on-vuln:
        description: "Fail the workflow if vulnerabilities are found"
        type: boolean
        default: true
      ignore-vulns:
        description: "Comma-separated list of vulnerability IDs to ignore (e.g. CVE-2026-1234,CVE-2026-9999)"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  deps-security:
    name: pip-audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install dependencies from lock
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: pip-audit
        env:
          FAIL_ON_VULN: ${{ inputs.fail-on-vuln }}
          IGNORE_VULNS: ${{ inputs.ignore-vulns }}
        run: |
          set -euo pipefail
          ignore_args=()
          if [[ -n "$IGNORE_VULNS" ]]; then
            IFS=',' read -r -a ignore_arr <<< "$IGNORE_VULNS"
            for v in "${ignore_arr[@]}"; do
              v="${v#"${v%%[![:space:]]*}"}"
              v="${v%"${v##*[![:space:]]}"}"
              [[ -z "$v" ]] && continue
              ignore_args+=(--ignore-vuln "$v")
            done
          fi

          if [[ "$FAIL_ON_VULN" == "true" ]]; then
            uv run --with pip-audit pip-audit "${ignore_args[@]}"
          else
            uv run --with pip-audit pip-audit "${ignore_args[@]}" || true
          fi
